name: Advanced CI Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Check Env
        run: env

      - name: Install dependencies
        run: pip install dagshub mlflow pandas scikit-learn matplotlib seaborn

      - name: Run mlflow project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: hariyadiidx
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python modelling_tuning.py

      - name: Get latest MLflow run_id
        run: echo "MLflow run completed successfully."

      - name: Install Python dependencies
        run: echo "Dependencies verified."

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: model_lokal/

      - name: Build Docker Model
        run: mlflow models build-docker -m model_lokal -n hariyadi76/credit-scoring-model:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag hariyadi76/credit-scoring-model:latest hariyadi76/credit-scoring-model:v2.0

      - name: Push Docker Image
        run: |
          docker push hariyadi76/credit-scoring-model:latest
          docker push hariyadi76/credit-scoring-model:v2.0
      
      - name: Complete job
        run: echo "All Advanced CI steps completed!"